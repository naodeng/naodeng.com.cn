name: Github Pages Deployment

on:
  workflow_dispatch: # 已暂停自动触发，需手动执行
  # push:
  #   branches:
  #     - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Wiki style check (warning mode)
        run: npm run wiki:style:check
        continue-on-error: true

      - name: Wiki style check (strict gate)
        if: ${{ vars.WIKI_STYLE_STRICT == 'true' }}
        run: npm run wiki:style:check:strict

      - name: SEO static check (warning mode)
        run: npm run seo:check
        continue-on-error: true

      - name: SEO static check (strict gate)
        if: ${{ vars.SEO_STRICT == 'true' }}
        run: npm run seo:check:strict

      - name: Clean Astro cache
        run: rm -rf .astro

      - name: Build
        run: npm run build

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
