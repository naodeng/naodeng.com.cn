name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Wiki style check (warning mode)
        run: npm run wiki:style:check
        continue-on-error: true

      - name: Wiki style check (strict gate)
        if: ${{ vars.WIKI_STYLE_STRICT == 'true' }}
        run: npm run wiki:style:check:strict

      - name: SEO static check (warning mode)
        run: npm run seo:check
        continue-on-error: true

      - name: SEO static check (strict gate)
        if: ${{ vars.SEO_STRICT == 'true' }}
        run: npm run seo:check:strict

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy
