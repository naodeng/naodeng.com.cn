name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Wiki style check (warning mode)
        run: npm run wiki:style:check
        continue-on-error: true

      - name: Wiki style check (strict gate)
        if: ${{ vars.WIKI_STYLE_STRICT == 'true' }}
        run: npm run wiki:style:check:strict

      - name: SEO static check (warning mode)
        run: npm run seo:check
        continue-on-error: true

      - name: SEO static check (strict gate)
        if: ${{ vars.SEO_STRICT == 'true' }}
        run: npm run seo:check:strict

      - name: Clean Astro cache
        run: rm -rf .astro

      - name: Build
        run: npm run build

      - name: Install test dependencies
        run: npm ci
        working-directory: tests

      - name: Run unit tests
        run: npx vitest --run
        working-directory: tests

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: tests

      - name: Run E2E tests
        run: npx playwright test
        working-directory: tests
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: "http://localhost:4321"
