<!DOCTYPE html><html lang="en"> <head><meta charset="UTF-8"><title>redirect...</title><meta name="robots" content="noindex, follow"><link rel="sitemap" href="/sitemap-index.xml"><meta name="generator" content="Astro v5.17.0"><link rel="alternate" hreflang="en-US" href="https://inaodeng.com/en/"><link rel="alternate" hreflang="zh-CN" href="https://inaodeng.com/zh-cn/"><link rel="icon" type="image/svg+xml" href="/favicon.svg"><link rel="icon" sizes="192x192" href="/android-chrome-192x192.png"><link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png"><meta name="color-scheme" content="light dark"><meta property="og:type" content="website"><meta property="og:title" content="Nao's Blog"><meta property="og:site_name" content="Nao's Blog"><meta property="og:description" content="naodeng, inaodeng.com, personal blog, software testing, performance testing, API testing, automation testing, agile testing."><meta property="og:image" content="https://inaodeng.com/ogp.png"><meta property="og:url" content="https://inaodeng.com/"><meta property="og:locale" content="en"><meta name="twitter:card" content="summary"><meta name="twitter:site" content="@inaodeng"><noscript><meta http-equiv="refresh" content="0;url=https://inaodeng.com/en/"></noscript><script>(function(){const langs = ["en","zh-cn"];
const baseUrl = "https://inaodeng.com/";
const defaultLocale = "en";

      (function () {
        // 1. 用户曾在站内选择过语言时，优先使用
        if (
          localStorage.selectedLang &&
          langs.includes(localStorage.selectedLang)
        ) {
          location.replace(baseUrl + localStorage.selectedLang + "/");
          return;
        }
        // 2. 根据浏览器语言偏好选择站点语言（navigator.language + navigator.languages）
        var preferred = navigator.language || navigator.userLanguage || "";
        var list = navigator.languages && navigator.languages.length
          ? [preferred].concat(navigator.languages)
          : [preferred];
        for (var i = 0; i < list.length; i++) {
          var raw = (list[i] || "").toLowerCase();
          if (langs.includes(raw)) {
            location.replace(baseUrl + raw + "/");
            return;
          }
          var primary = raw.split("-")[0];
          if (primary === "zh") {
            location.replace(baseUrl + "zh-cn/");
            return;
          }
          if (langs.includes(primary)) {
            location.replace(baseUrl + primary + "/");
            return;
          }
        }
        location.replace(baseUrl + defaultLocale + "/");
      })();
    })();</script></head> <body> <h1>redirect...</h1> </body></html>
